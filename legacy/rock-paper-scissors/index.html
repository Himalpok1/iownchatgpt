  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Game",
    "name": "Rock Paper Scissors Online",
    "url": "https://iownchatgpt.com/rock-paper-scissors/",
    "description": "A browser-based rock paper scissors game against the computer.",

<body>
  <main class="container">
    <header class="topbar">
      <a href="../index.html" class="nav-link">Home</a>
      <h1>Rock Paper Scissors</h1>
      <a href="../guides.html" class="nav-link">Guides</a>
    </header>

    <section class="score-box" aria-label="Current score">
      <div>
        <p class="label">You</p>
        <p class="score" id="playerScore">0</p>
      </div>
      <div>
        <p class="label">Computer</p>
        <p class="score" id="cpuScore">0</p>
      </div>
      <div>
        <p class="label">Round</p>
        <p class="score" id="roundCount">1</p>
      </div>
    </section>

    <section class="choice-row" aria-label="Choose your move">
      <button type="button" class="choice" data-choice="rock">✊ Rock</button>
      <button type="button" class="choice" data-choice="paper">✋ Paper</button>
      <button type="button" class="choice" data-choice="scissors">✌️ Scissors</button>
    </section>

    <section class="result-box" aria-live="polite">
      <p id="resultText">Pick your move to start.</p>
      <p id="detailText" class="muted"></p>
    </section>

    <section class="history-box">
      <div class="history-header">
        <h2>Last Rounds</h2>
        <button id="resetBtn" type="button">Reset Match</button>
      </div>
      <ul id="historyList"></ul>
    </section>

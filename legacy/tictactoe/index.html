<body>
  <div class="container">

          </div>
          <button class="btn btn-primary" onclick="startGame()">Start Game</button>

            <div class="cell" data-index="0" onclick="makeMove(0)"></div>
            <div class="cell" data-index="1" onclick="makeMove(1)"></div>

            <div class="cell" data-index="8" onclick="makeMove(8)"></div>
          </div>

          </div>

  <script>
    // Game state
    let board = ['', '', '', '', '', '', '', '', ''];
    let currentPlayer = 'X';
    let player1Name = '';
    let player2Name = '';
    let gameActive = false;
    let gameOver = false;

    // Leaderboard data (in-memory storage)
    let leaderboardData = {};

    // Win conditions
    const winConditions = [
      [0, 1, 2], // Top row
      [3, 4, 5], // Middle row
      [6, 7, 8], // Bottom row
      [0, 3, 6], // Left column
      [1, 4, 7], // Middle column
      [2, 5, 8], // Right column
      [0, 4, 8], // Diagonal top-left to bottom-right
      [2, 4, 6]  // Diagonal top-right to bottom-left
    ];

    function startGame() {
      const p1Input = document.getElementById('player1Name').value.trim();
      const p2Input = document.getElementById('player2Name').value.trim();

      if (!p1Input || !p2Input) {
        alert('Please enter names for both players!');
        return;
      }

      if (p1Input === p2Input) {
        alert('Players must have different names!');
        return;
      }

      player1Name = p1Input;
      player2Name = p2Input;

      // Initialize players in leaderboard if they don't exist
      if (!leaderboardData[player1Name]) {
        leaderboardData[player1Name] = { wins: 0, losses: 0, ties: 0 };
      }
      if (!leaderboardData[player2Name]) {
        leaderboardData[player2Name] = { wins: 0, losses: 0, ties: 0 };
      }

      // Show game board, hide setup
      document.getElementById('playerSetup').classList.add('hidden');
      document.getElementById('gameBoard').classList.remove('hidden');

      gameActive = true;
      gameOver = false;
      currentPlayer = 'X';
      board = ['', '', '', '', '', '', '', '', ''];

      updateTurnIndicator();
      renderBoard();
      updateLeaderboard();
    }

    function makeMove(index) {
      if (!gameActive || gameOver || board[index] !== '') {
        return;
      }

      board[index] = currentPlayer;
      renderBoard();

      if (checkWin()) {
        endGame('win');
        return;
      }

      if (checkTie()) {
        endGame('tie');
        return;
      }

      // Switch player
      currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
      updateTurnIndicator();
    }

    function renderBoard() {
      const cells = document.querySelectorAll('.cell');
      cells.forEach((cell, index) => {
        cell.textContent = board[index];
        cell.className = 'cell';
        if (board[index] !== '') {
          cell.classList.add('taken');
          cell.classList.add(board[index].toLowerCase());
        }
      });
    }

    function checkWin() {
      for (let condition of winConditions) {
        const [a, b, c] = condition;
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          highlightWinningCells(condition);
          return true;
        }
      }
      return false;
    }

    function highlightWinningCells(cells) {
      cells.forEach(index => {
        document.querySelector(`[data-index="${index}"]`).classList.add('winning');
      });
    }

    function checkTie() {
      return board.every(cell => cell !== '');
    }

    function endGame(result) {
      gameOver = true;
      gameActive = false;

      const resultDiv = document.getElementById('gameResult');
      const resultText = document.getElementById('resultText');
      resultDiv.classList.remove('hidden');

      if (result === 'win') {
        const winner = currentPlayer === 'X' ? player1Name : player2Name;
        const loser = currentPlayer === 'X' ? player2Name : player1Name;
        
        resultText.textContent = `${winner} wins!`;
        resultDiv.className = 'game-result winner';

        // Update leaderboard
        leaderboardData[winner].wins++;
        leaderboardData[loser].losses++;
      } else if (result === 'tie') {
        resultText.textContent = "It's a tie!";
        resultDiv.className = 'game-result tie';

        // Update leaderboard
        leaderboardData[player1Name].ties++;
        leaderboardData[player2Name].ties++;
      }

      updateLeaderboard();
    }

    function updateTurnIndicator() {
      const turnText = document.getElementById('turnText');
      const turnSymbol = document.getElementById('turnSymbol');
      
      const playerName = currentPlayer === 'X' ? player1Name : player2Name;
      turnText.textContent = `${playerName}'s Turn`;
      turnSymbol.textContent = currentPlayer;
      turnSymbol.className = `player-symbol ${currentPlayer.toLowerCase()}`;
    }

    function resetGame() {
      board = ['', '', '', '', '', '', '', '', ''];
      currentPlayer = 'X';
      gameActive = true;
      gameOver = false;

      document.getElementById('gameResult').classList.add('hidden');
      
      renderBoard();
      updateTurnIndicator();
    }

    function newPlayers() {
      document.getElementById('gameBoard').classList.add('hidden');
      document.getElementById('playerSetup').classList.remove('hidden');
      document.getElementById('gameResult').classList.add('hidden');
      
      board = ['', '', '', '', '', '', '', '', ''];
      gameActive = false;
      gameOver = false;
      currentPlayer = 'X';
    }

    function updateLeaderboard() {
      const leaderboardContent = document.getElementById('leaderboardContent');
      
      if (Object.keys(leaderboardData).length === 0) {
        leaderboardContent.innerHTML = '<div class="empty-leaderboard">Start playing to see stats!</div>';
        return;
      }

      // Convert to array and sort by wins
      const sortedPlayers = Object.entries(leaderboardData)
        .map(([name, stats]) => ({
          name,
          ...stats,
          totalGames: stats.wins + stats.losses + stats.ties,
          winPercentage: stats.wins + stats.losses > 0 
            ? ((stats.wins / (stats.wins + stats.losses)) * 100).toFixed(1)
            : '0.0'
        }))
        .sort((a, b) => b.wins - a.wins);

      let html = `
        <table class="leaderboard-table">
          <thead>
            <tr>
              <th>Player</th>
              <th>W</th>
              <th>L</th>
              <th>T</th>
              <th>Win%</th>
            </tr>
          </thead>
          <tbody>
      `;

      sortedPlayers.forEach(player => {
        html += `
          <tr>
            <td class="player-name">${player.name}</td>
            <td class="stat-number">${player.wins}</td>
            <td class="stat-number">${player.losses}</td>
            <td class="stat-number">${player.ties}</td>
            <td class="win-percentage">${player.winPercentage}%</td>
          </tr>
        `;
      });

      html += `
          </tbody>
        </table>
      `;

      leaderboardContent.innerHTML = html;
    }

    function clearLeaderboard() {
      if (Object.keys(leaderboardData).length === 0) {
        return;
      }

      if (confirm('Are you sure you want to clear the leaderboard?')) {
        leaderboardData = {};
        updateLeaderboard();
      }
    }

    async function shareGameSetup() {
      const shareButton = document.getElementById('setupShareButton');
      const originalText = shareButton.textContent;
      
      const p1 = document.getElementById('player1Name').value.trim() || 'Player 1';
      const p2 = document.getElementById('player2Name').value.trim() || 'Player 2';
      
      const shareText = `Join me for Tic-Tac-Toe! ${p1} vs ${p2} - Play now!`;
      
      try {
        await navigator.clipboard.writeText(shareText);
        shareButton.textContent = 'Copied!';
        shareButton.style.backgroundColor = 'var(--color-success)';
        
        setTimeout(() => {
          shareButton.textContent = originalText;
          shareButton.style.backgroundColor = '';
        }, 2000);
      } catch (err) {
        const textArea = document.createElement('textarea');
        textArea.value = shareText;
        textArea.style.position = 'fixed';
        textArea.style.left = '-999999px';
        document.body.appendChild(textArea);
        textArea.select();
        
        try {
          document.execCommand('copy');
          shareButton.textContent = 'Copied!';
          shareButton.style.backgroundColor = 'var(--color-success)';
          
          setTimeout(() => {
            shareButton.textContent = originalText;
            shareButton.style.backgroundColor = '';
          }, 2000);
        } catch (err) {
          alert('Failed to copy to clipboard');
        }
        
        document.body.removeChild(textArea);
      }
    }

    async function shareGameDuring() {
      const shareButton = document.getElementById('duringGameShareButton');
      const originalText = shareButton.textContent;
      
      const shareText = `Watch my Tic-Tac-Toe game! ${player1Name} vs ${player2Name} in progress!`;
      
      try {
        await navigator.clipboard.writeText(shareText);
        shareButton.textContent = 'Copied!';
        shareButton.style.backgroundColor = 'var(--color-success)';
        
        setTimeout(() => {
          shareButton.textContent = originalText;
          shareButton.style.backgroundColor = '';
        }, 2000);
      } catch (err) {
        const textArea = document.createElement('textarea');
        textArea.value = shareText;
        textArea.style.position = 'fixed';
        textArea.style.left = '-999999px';
        document.body.appendChild(textArea);
        textArea.select();
        
        try {
          document.execCommand('copy');
          shareButton.textContent = 'Copied!';
          shareButton.style.backgroundColor = 'var(--color-success)';
          
          setTimeout(() => {
            shareButton.textContent = originalText;
            shareButton.style.backgroundColor = '';
          }, 2000);
        } catch (err) {
          alert('Failed to copy to clipboard');
        }
        
        document.body.removeChild(textArea);
      }
    }

    function generateShareText() {
      const winner = gameOver ? (currentPlayer === 'X' ? player1Name : player2Name) : null;
      const loser = gameOver ? (currentPlayer === 'X' ? player2Name : player1Name) : null;
      
      // Generate board visual
      const boardVisual = `
${board[0] || '_'}|${board[1] || '_'}|${board[2] || '_'}
${board[3] || '_'}|${board[4] || '_'}|${board[5] || '_'}
${board[6] || '_'}|${board[7] || '_'}|${board[8] || '_'}`;
      
      let resultText;
      if (checkWin()) {
        resultText = `🎮 Tic-Tac-Toe Result 🎮\n${player1Name} vs ${player2Name}\n\nWinner: ${winner} 🏆\n\nFinal Board:${boardVisual}\n\nPlay Tic-Tac-Toe and challenge your friends!`;
      } else {
        resultText = `🎮 Tic-Tac-Toe Result 🎮\n${player1Name} vs ${player2Name}\n\nResult: It's a Tie! 🤝\n\nFinal Board:${boardVisual}\n\nPlay Tic-Tac-Toe and challenge your friends!`;
      }
      
      return resultText;
    }

    async function shareGameResult() {
      const shareButton = document.getElementById('shareButton');
      const originalText = shareButton.textContent;
      
      const shareText = generateShareText();
      
      try {
        // Copy to clipboard
        await navigator.clipboard.writeText(shareText);
        
        // Show success feedback
        shareButton.textContent = 'Copied!';
        shareButton.style.backgroundColor = 'var(--color-success)';
        
        // Reset button after 2 seconds
        setTimeout(() => {
          shareButton.textContent = originalText;
          shareButton.style.backgroundColor = '';
        }, 2000);
      } catch (err) {
        // Fallback for older browsers
        const textArea = document.createElement('textarea');
        textArea.value = shareText;
        textArea.style.position = 'fixed';
        textArea.style.left = '-999999px';
        document.body.appendChild(textArea);
        textArea.select();
        
        try {
          document.execCommand('copy');
          shareButton.textContent = 'Copied!';
          shareButton.style.backgroundColor = 'var(--color-success)';
          
          setTimeout(() => {
            shareButton.textContent = originalText;
            shareButton.style.backgroundColor = '';
          }, 2000);
        } catch (err) {
          alert('Failed to copy to clipboard');
        }
        
        document.body.removeChild(textArea);
      }
    }
  </script>
